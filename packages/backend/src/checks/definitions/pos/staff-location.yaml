    url: "https://atendimento.nuvemshop.com.br/pt_BR/equipe"
  - title: "Locais na Nuvemshop"
    url: "https://atendimento.nuvemshop.com.br/pt_BR/locais"
  - title: "POS Pro e equipe"
    url: "https://atendimento.nuvemshop.com.br/pt_BR/pdv"
