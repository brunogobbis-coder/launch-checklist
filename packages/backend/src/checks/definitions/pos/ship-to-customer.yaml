check_type: pos_ship_to_customer
section: pos
subcategory: fulfillment
display_name: "Envio para o cliente"
description: "Verificar se o envio a partir da loja física está configurado (POS Pro)."
execution_mode: manual
default_assessment: >
  Verifique se o envio a partir da loja física está configurado: perfis de envio, transportadoras, etiquetas e integração com pedidos criados no PDV para envio ao cliente.
business_impact: >
  Sem envio configurado, pedidos feitos na loja física não podem ser despachados. A configuração permite vender no PDV e enviar para o cliente, ampliando o alcance das vendas.
recommendations:
  - "Configure perfis de envio para pedidos originados no PDV"
  - "Revise transportadoras e custos de envio por local"
  - "Teste fluxo completo: venda no PDV, geração de etiqueta, despacho"
