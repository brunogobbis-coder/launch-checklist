check_type: 301_redirects
section: front_end
subcategory: redirects
display_name: "Redirecionamentos 301"
description: "Verificar se redirecionamentos 301 estão configurados corretamente para SEO."
execution_mode: manual
default_assessment: >
  Se migrou de outra plataforma ou alterou URLs, configure redirecionamentos 301 das URLs antigas para as novas. Liste cada URL antiga e o destino correto. Teste acessando as URLs antigas para confirmar o redirecionamento.
business_impact: >
  URLs antigas sem redirecionamento geram erros 404, perda de tráfego orgânico e penalização de SEO. Redirecionamentos 301 preservam o valor de links e ranqueamento nos buscadores.
recommendations:
  - "Liste todas as URLs antigas que precisam ser redirecionadas"
  - "Configure cada redirecionamento para a URL nova correspondente"
  - "Teste os redirecionamentos antes do lançamento"
