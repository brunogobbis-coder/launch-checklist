check_type: password_page
section: front_end
subcategory: experience
display_name: "Página de senha"
description: "Verificar se a página de senha está habilitada antes do lançamento."
execution_mode: manual
default_assessment: >
  Confirme que a página de senha (modo "em construção") está desativada antes do lançamento oficial. Se a loja ainda não estiver pronta, mantenha ativada e personalize a mensagem exibida aos visitantes.
business_impact: >
  Loja com página de senha ativa no lançamento bloqueia o acesso de clientes e perde vendas. Desativar no momento certo garante que a loja fique acessível quando anunciada.
recommendations:
  - "Desative a página de senha antes do lançamento oficial"
  - "Personalize a mensagem se mantiver ativa durante preparação"
  - "Teste o acesso público após desativar"
