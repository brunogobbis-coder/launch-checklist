check_type: default_placeholders
section: front_end
subcategory: experience
display_name: "Placeholders padrão"
description: "Identificar e remover conteúdo placeholder padrão."
execution_mode: manual
default_assessment: >
  Navegue pela loja como cliente e identifique textos de exemplo ("Lorem ipsum", descrições genéricas) e imagens placeholder. Substitua por conteúdo real da marca: descrições, banners e textos institucionais.
business_impact: >
  Conteúdo placeholder transmite desleixo e prejudica a credibilidade. Loja com conteúdo real converte mais e passa maior confiança ao cliente.
recommendations:
  - "Substitua textos de exemplo por descrições reais"
  - "Revise imagens de placeholder em banners e produtos"
  - "Use a IA da Nuvemshop para criar descrições se necessário"
useful_links:
