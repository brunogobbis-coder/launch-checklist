check_type: meta_pixel
section: front_end
subcategory: tracking
display_name: "Meta Pixel"
description: "Verificar se o Meta Pixel está configurado para rastreamento de conversões."
execution_mode: manual
default_assessment: >
  Confirme que o Meta Pixel (Facebook/Instagram) está instalado na loja. O ID do Pixel deve estar em Códigos externos. O Pixel permite rastrear conversões e criar públicos para anúncios no Meta.
business_impact: >
  Meta Pixel ausente impede a otimização de campanhas no Facebook e Instagram, remarketing e criação de públicos similares. Configuração correta aumenta o retorno de anúncios pagos.
recommendations:
  - "Acesse o Gerenciador de Eventos do Meta Business e copie o ID do Pixel"
  - "Cole o código do Pixel em Configurações > Códigos externos"
  - "Verifique eventos de conversão (compra, add to cart) no Gerenciador de Eventos"
useful_links:
  - title: "Códigos externos"
    url: "https://atendimento.nuvemshop.com.br/12313-codigos-externos"
  - title: "Configurações"
    url: "https://atendimento.nuvemshop.com.br/pt_BR/configuracoes"
  - title: "Aplicativos"
