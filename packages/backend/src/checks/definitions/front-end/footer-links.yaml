check_type: footer_links
section: front_end
subcategory: experience
display_name: "Links do rodapé"
description: "Verificar se os links do rodapé estão funcionando e relevantes."
execution_mode: manual
default_assessment: >
  Revise se os links do rodapé estão funcionando, apontam para páginas corretas e incluem informações essenciais: políticas (privacidade, termos, trocas), contato e redes sociais. Organize em colunas se o layout permitir.
business_impact: >
  Links quebrados no rodapé geram frustração e prejudicam a confiança. Rodapé bem configurado facilita o acesso a informações legais e canais de contato, reduzindo dúvidas e reclamações.
recommendations:
  - "Adicione links para Política de Privacidade, Termos e Trocas"
  - "Inclua links de contato e redes sociais"
  - "Teste todos os links antes do lançamento"
