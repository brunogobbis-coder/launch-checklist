check_type: checkout_settings
section: admin_settings
subcategory: checkout
display_name: "Configurações do checkout"
description: "Verificar se as configurações do checkout estão otimizadas para conversão."
execution_mode: manual
default_assessment: >
  Revise as configurações do checkout: campos obrigatórios, opções de compra como convidado, termos e condições, cupons e upsell. Garanta que o fluxo esteja enxuto e sem fricções desnecessárias para maximizar conversão.
business_impact: >
  Checkout com muitos campos ou opções confusas aumenta abandono. Configurações otimizadas reduzem fricção e melhoram a taxa de conclusão de compra.
recommendations:
  - "Habilite compra como convidado para reduzir fricção"
  - "Revise campos obrigatórios e remova os desnecessários"
  - "Configure termos, políticas e cupons de forma clara e acessível"
useful_links:
